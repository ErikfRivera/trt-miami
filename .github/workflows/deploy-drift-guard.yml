name: Deploy drift guard

# Catches the STR-130 failure mode: origin/main moves but no Vercel production
# deploy fires. Fails the workflow (and surfaces in the Actions tab + email
# notifications) when origin/main HEAD and the live deploy disagree for more
# than the grace period.
#
# STR-158: switched from the Vercel API (required a token that kept getting
# revoked) to a built-in /sha.txt probe served by the deploy itself. Zero
# secrets, self-healing.

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  PROBE_URL: 'https://miami.stronghealth.com/sha.txt'
  GRACE_SECONDS: '300'

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve origin/main HEAD
        id: gh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          resp=$(gh api "repos/${GITHUB_REPOSITORY}/commits/main")
          sha=$(echo "$resp" | jq -r '.sha')
          commit_iso=$(echo "$resp" | jq -r '.commit.committer.date // .commit.author.date')
          commit_epoch=$(date -u -d "$commit_iso" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$commit_iso" +%s)
          echo "origin_sha=${sha}" >>"$GITHUB_OUTPUT"
          echo "origin_commit_epoch=${commit_epoch}" >>"$GITHUB_OUTPUT"
          echo "origin/main HEAD: ${sha} (committed at ${commit_iso}, epoch ${commit_epoch})"

      - name: Probe live deploy SHA
        id: live
        run: |
          set -euo pipefail
          # Cache-bust to bypass any edge layer.
          url="${PROBE_URL}?t=$(date -u +%s)"
          http_code=$(curl -sS -o /tmp/sha.txt -w '%{http_code}' \
            -H "Cache-Control: no-cache" \
            -H "Pragma: no-cache" \
            "$url")
          if [ "$http_code" != "200" ]; then
            echo "::error title=Live deploy probe failed::GET ${PROBE_URL} returned HTTP ${http_code}. Either the deploy is down or /sha.txt was removed. Body:"
            cat /tmp/sha.txt || true
            exit 1
          fi
          deploy_sha=$(tr -d '[:space:]' < /tmp/sha.txt)
          if [ -z "$deploy_sha" ] || [ "$deploy_sha" = "unknown" ]; then
            echo "::error::Live deploy returned empty or 'unknown' SHA from ${PROBE_URL}. The deploy was probably built outside Vercel (VERCEL_GIT_COMMIT_SHA was not set). Re-deploy via Vercel to restore."
            exit 1
          fi
          echo "deploy_sha=${deploy_sha}" >>"$GITHUB_OUTPUT"
          echo "live deploy SHA: ${deploy_sha}"

      - name: Compare and fail on drift
        env:
          ORIGIN_SHA: ${{ steps.gh.outputs.origin_sha }}
          ORIGIN_COMMIT_EPOCH: ${{ steps.gh.outputs.origin_commit_epoch }}
          DEPLOY_SHA: ${{ steps.live.outputs.deploy_sha }}
        run: |
          set -euo pipefail
          if [ "$ORIGIN_SHA" = "$DEPLOY_SHA" ]; then
            echo "OK: origin/main (${ORIGIN_SHA:0:7}) == live deploy (${DEPLOY_SHA:0:7})"
            exit 0
          fi
          now=$(date -u +%s)
          age=$(( now - ORIGIN_COMMIT_EPOCH ))
          if [ "$age" -lt "$GRACE_SECONDS" ]; then
            echo "Drift detected but origin/main commit is fresh (${age}s < ${GRACE_SECONDS}s grace). origin=${ORIGIN_SHA:0:7} live=${DEPLOY_SHA:0:7}. Waiting for auto-deploy."
            exit 0
          fi
          echo "::error title=Deploy drift::origin/main is at ${ORIGIN_SHA:0:7} (${age}s old) but live deploy at ${PROBE_URL} is at ${DEPLOY_SHA:0:7}. Run \`vercel deploy --prod --cwd site\` until STR-130 native auto-deploy is restored."
          exit 1
